name: juevi_studio_os
description: "Ju&Vi Studio OS — app interno do estúdio criativo"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.0
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  fl_chart: ^0.67.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  window_manager: ^0.3.8
  shared_preferences: ^2.2.3
  timeago: ^3.6.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/characters/
    - assets/logos/
